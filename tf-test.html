<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CHAESUNBE · English Academy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: #f2f2f7; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; color: #1c1c1e; -webkit-font-smoothing: antialiased; }

/* ── 헤더 ── */
.hdr { background: rgba(242,242,247,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 10px 18px 8px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.hdr-left { display: flex; flex-direction: column; }
.hdr-logo  { font-size: 8px; letter-spacing: 2.5px; color: #2f7af5; text-transform: uppercase; font-weight: 700; opacity: 0.75; }
.hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; margin-top: 1px; }
.pill { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }
.pill-admin   { background: linear-gradient(135deg,#2f7af5,#6b3ff0); color: white; }
.pill-student { background: linear-gradient(135deg,#1a9e45,#158a3a); color: white; }

/* ── 모드 토글 ── */
.mode-toggle { display: flex; background: rgba(0,0,0,0.07); border-radius: 20px; padding: 3px; gap: 2px; }
.mtab { padding: 5px 12px; border: none; border-radius: 16px; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; background: transparent; color: rgba(28,28,30,0.45); transition: all 0.18s; }
.mtab.on { background: white; color: #1c1c1e; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

/* ── PIN 모달 ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: white; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: rgba(28,28,30,0.5); text-align: center; margin-bottom: 20px; line-height: 1.5; }
.pin-input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 22px; font-family: inherit; color: #1c1c1e; outline: none; text-align: center; letter-spacing: 6px; margin-bottom: 12px; transition: border-color 0.2s; -webkit-appearance: none; }
.pin-input:focus { border-color: #2f7af5; background: white; }
.pin-input.err { border-color: #d93025; animation: shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ── 하단 탭바 ── */
.bottom-tab-bar {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
background: white;
border-top: 1px solid rgba(0,0,0,0.1);
display: flex;
padding: 6px 0;
padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
}
.btab {
flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 3px; border: none; cursor: pointer; font-family: inherit;
background: transparent;
padding: 8px 4px;
transition: opacity 0.15s;
min-width: 0;
border-top: 2.5px solid transparent;
}
.btab:active { opacity: 0.6; }
.btab-ico  { font-size: clamp(18px, 4vw, 22px); line-height: 1; }
.btab-lbl  { font-size: clamp(9px, 2vw, 11px); font-weight: 700; color: rgba(28,28,30,0.35); letter-spacing: 0.1px; white-space: nowrap; }
.btab.active { border-top-color: #2f7af5; }
.btab.active .btab-lbl { color: #2f7af5; }
.btab-indicator { display: none; }

/* ── 컨텐츠 래퍼 ── */
.wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px calc(80px + env(safe-area-inset-bottom, 0px)); }

/* ── 공통 컴포넌트 ── */
.card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.sec-title { font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.sec-title::after { content: ‘’; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
.lbl { font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.55); margin-bottom: 5px; }
.inp { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 14px; font-family: inherit; color: #1c1c1e; outline: none; margin-bottom: 10px; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
.inp:focus { border-color: #2f7af5; background: #fff; }
.inp-sm { width: 90px; text-align: center; }
.inp-lg { font-size: 22px; text-align: center; padding: 14px; letter-spacing: 1px; }
.sel-wrap { position: relative; margin-bottom: 10px; }
.sel-wrap::after { content: ‘▾’; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); font-size: 12px; color: rgba(28,28,30,0.4); pointer-events: none; }
.sel { width: 100%; padding: 11px 36px 11px 13px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 14px; font-family: inherit; color: #1c1c1e; outline: none; -webkit-appearance: none; cursor: pointer; transition: border-color 0.2s; }
.sel:focus { border-color: #2f7af5; background: #fff; }
.btn { padding: 13px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.15s, transform 0.1s; }
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn-full { width: 100%; margin-top: 6px; display: block; }
.btn-blue   { background: linear-gradient(135deg,#2f7af5,#6b3ff0); color: white; box-shadow: 0 2px 12px rgba(47,122,245,0.25); }
.btn-green  { background: linear-gradient(135deg,#1a9e45,#158a3a); color: white; box-shadow: 0 2px 12px rgba(26,158,69,0.2); }
.btn-gray   { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); color: rgba(28,28,30,0.55); }
.btn-red    { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: rgba(217,48,37,0.1); border: 1.5px solid rgba(217,48,37,0.2); color: #d93025; }
.btn-orange { background: rgba(255,149,0,0.12); border: 1.5px solid rgba(255,149,0,0.3); color: #c4600a; font-size: 14px; font-weight: 700; padding: 12px 18px; border-radius: 12px; }
.name-inp { width: 100%; padding: 13px 14px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 16px; font-family: inherit; color: #1c1c1e; outline: none; text-align: left; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
.name-inp:focus { border-color: #2f7af5; background: #fff; }

/* ── T/F 전용 ── */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { padding: 9px 6px; text-align: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); background: #f2f2f7; border-bottom: 1.5px solid rgba(0,0,0,0.08); }
.tbl th.c0 { width: 42px; border-right: 1px solid rgba(0,0,0,0.08); }
.tbl th.c1 { border-right: 1px solid rgba(0,0,0,0.08); }
.tbl td { padding: 7px 6px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
.tbl td.c0 { font-size: 12px; font-weight: 700; color: rgba(28,28,30,0.35); border-right: 1px solid rgba(0,0,0,0.06); }
.tbl td.c1 { border-right: 1px solid rgba(0,0,0,0.06); }
.tbl tr:last-child td { border-bottom: none; }
.tfb { width: 100%; padding: 9px 4px; border-radius: 9px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 13px; font-weight: 700; cursor: pointer; color: rgba(28,28,30,0.5); font-family: inherit; transition: all 0.12s; }
.tfb:active { transform: scale(0.9); }
.t-on { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.f-on { background: #fdf0ee; border-color: #d93025; color: #d93025; }
.ok   { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.no   { background: rgba(100,100,100,0.08); border-color: rgba(100,100,100,0.2); color: rgba(100,100,100,0.5); text-decoration: line-through; }
.fix-banner { background: rgba(255,149,0,0.1); border: 1.5px solid rgba(255,149,0,0.3); border-radius: 12px; padding: 11px 14px; margin-bottom: 12px; font-size: 13px; color: #c4600a; font-weight: 600; }

/* ── 단어시험 전용 ── */
.upload-area { border: 2px dashed rgba(0,0,0,0.15); border-radius: 14px; padding: 36px 20px; text-align: center; cursor: pointer; background: #f9f9fb; transition: all 0.2s; }
.upload-area:hover, .upload-area.drag { border-color: #2f7af5; background: rgba(47,122,245,0.04); }
.upload-area input { display: none; }
.upload-ico   { font-size: 32px; margin-bottom: 10px; }
.upload-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.upload-sub   { font-size: 12px; color: rgba(28,28,30,0.45); }
.img-preview  { position: relative; border-radius: 12px; overflow: hidden; margin-bottom: 12px; background: #f2f2f7; border: 1px solid rgba(0,0,0,0.08); }
.img-preview img { width: 100%; max-height: 300px; object-fit: contain; display: block; }
.img-del { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.55); border: none; color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.word-pair { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.word-pair input { margin: 0; flex: 1; }
.word-pair-num { font-size: 11px; color: rgba(28,28,30,0.35); min-width: 18px; text-align: right; }
.word-pair-del { background: none; border: none; color: rgba(28,28,30,0.3); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; flex-shrink: 0; }
.word-pair-del:hover { color: #d93025; }
.result-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 13px; }
.result-row:last-child { border-bottom: none; }
.result-row.ok { background: rgba(26,158,69,0.05); }
.result-row.ng { background: rgba(217,48,37,0.05); }
.result-ico { font-size: 14px; flex-shrink: 0; }
.result-ko  { font-weight: 600; flex: 1; }
.result-en  { font-size: 12px; color: rgba(28,28,30,0.5); }
.result-written { font-size: 12px; color: #d93025; }
.retry-card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 28px 20px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); text-align: center; }
.retry-ko { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.retry-hint { font-size: 13px; color: rgba(28,28,30,0.45); margin-bottom: 20px; }
.ai-banner { background: rgba(47,122,245,0.07); border: 1.5px solid rgba(47,122,245,0.2); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; text-align: center; }

/* ── 공통 리스트/결과 ── */
.score-box { text-align: center; padding: 28px 20px; background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 12px; }
.score-num { font-size: 56px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
.score-sub { font-size: 14px; color: rgba(28,28,30,0.55); margin-bottom: 16px; }
.bar-bg { background: #f2f2f7; border-radius: 20px; height: 8px; overflow: hidden; }
.bar-fg { height: 100%; border-radius: 20px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); }
.exam-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; margin-bottom: 7px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: transform 0.12s; }
.exam-item.clickable { cursor: pointer; }
.exam-item.clickable:active { transform: scale(0.98); }
.e-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.e-icon-a    { background: linear-gradient(135deg,#2f7af5,#6b3ff0); }
.e-icon-s    { background: linear-gradient(135deg,#1a9e45,#158a3a); }
.e-icon-done { background: #c7c7cc; }
.ord-btns { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
.ord-btn { width: 26px; height: 22px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 6px; background: #f2f2f7; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(28,28,30,0.5); }
.ord-btn:hover { background: #e5e5ea; }
.ord-btn:disabled { opacity: 0.2; cursor: default; }
.res-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; }
.res-row:last-child { border-bottom: none; }
.res-av { width: 36px; height: 36px; border-radius: 10px; background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); flex-shrink: 0; text-align: center; line-height: 1.2; word-break: keep-all; padding: 0 2px; }
.score-pill { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.sp-hi { background: rgba(26,158,69,0.1);  color: #1a9e45; }
.sp-md { background: rgba(196,96,10,0.1);  color: #c4600a; }
.sp-lo { background: rgba(217,48,37,0.1);  color: #d93025; }
.badge-done { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: #e5e5ea; color: rgba(28,28,30,0.4); }

/* 출제방식 버튼 */
.type-btn { flex: 1; padding: 11px 6px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; text-align: center; transition: all 0.15s; color: rgba(28,28,30,0.35); }
.type-btn.on { border-color: #2f7af5; background: rgba(47,122,245,0.1); color: #2f7af5; }
.type-btn:active { transform: scale(0.97); }
.rtable { width: 100%; border-collapse: collapse; font-size: 13px; }
.rtable th { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(28,28,30,0.4); border-bottom: 1.5px solid rgba(0,0,0,0.08); }
.rtable td { padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
.rtable tr:last-child td { border-bottom: none; }
.rtable tbody tr:hover td { background: #f9f9fb; }
.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 14px; }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.35); cursor: pointer; border-bottom: 2px solid transparent; }
.tab-on { color: #2f7af5; border-bottom-color: #2f7af5; }
.atabs { display: flex; background: #e5e5ea; border-radius: 12px; padding: 3px; gap: 2px; margin-bottom: 16px; }
.atab { flex: 1; padding: 8px; border: none; border-radius: 9px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; background: transparent; color: rgba(28,28,30,0.5); }
.atab.on { background: white; color: #1c1c1e; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.school-tag { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; background: rgba(47,122,245,0.1); border: 1.5px solid rgba(47,122,245,0.2); font-size: 12px; font-weight: 600; color: #2f7af5; margin: 3px; }
.stag-del { cursor: pointer; font-size: 14px; color: rgba(47,122,245,0.4); }
.stag-del:hover { color: #d93025; }
.link-box { background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(0,0,0,0.08); border-top-color: #2f7af5; border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 12px; }
.loading { text-align: center; padding: 60px 20px; color: rgba(28,28,30,0.45); font-size: 14px; }
.empty   { text-align: center; padding: 50px 20px; color: rgba(28,28,30,0.45); }
.toast   { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.96); color: white; padding: 11px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.t-show { opacity: 1; }
</style>

</head>
<body>

<!-- 헤더 -->

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">English Academy</div>
    <div class="hdr-title">CHAESUNBE</div>
  </div>
  <div class="mode-toggle">
    <button class="mtab on" id="mtab-student" onclick="setMode('student')">학생 ✏️</button>
    <button class="mtab"    id="mtab-admin"   onclick="tryAdmin()">선생님 🔑</button>
  </div>
</div>

<!-- 콘텐츠 -->

<div class="wrap" id="wrap"><div class="loading"><div class="spinner"></div></div></div>

<!-- 하단 탭바 -->

<div class="bottom-tab-bar">
  <button class="btab active" id="btab-tf" onclick="switchTab('tf')">
    <span class="btab-ico">✏️</span>
    <span class="btab-lbl">T/F 시험</span>
    <span class="btab-indicator"></span>
  </button>
  <button class="btab" id="btab-word" onclick="switchTab('word')">
    <span class="btab-ico">🔤</span>
    <span class="btab-lbl">단어시험</span>
    <span class="btab-indicator"></span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  공통 설정
// ══════════════════════════════════════════════
const SUPA_URL  = 'https://pithlzhuqezeesprcbze.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const CLAUDE_KEY = 'YOUR_CLAUDE_API_KEY';

const H = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
const api = {
  get:   p     => fetch(SUPA_URL+'/rest/v1/'+p,{headers:H}).then(r=>r.json()),
  post:  (p,b,pref) => fetch(SUPA_URL+'/rest/v1/'+p,{method:'POST',headers:{...H,'Prefer':pref||'return=representation'},body:JSON.stringify(b)}),
  patch: (p,b) => fetch(SUPA_URL+'/rest/v1/'+p,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)}),
  del:   p     => fetch(SUPA_URL+'/rest/v1/'+p,{method:'DELETE',headers:H})
};

// 학교 목록 (기존 cs_schools 키 그대로 유지 — T/F 데이터 호환)
const schools = {
  get: ()    => { try{ return JSON.parse(localStorage.getItem('cs_schools')||'["기본"]'); }catch{ return['기본']; } },
  set: (arr) => localStorage.setItem('cs_schools',JSON.stringify(arr)),
  add: (s)   => { const a=schools.get(); if(!a.includes(s)){a.push(s);schools.set(a);} },
  del: (s)   => schools.set(schools.get().filter(x=>x!==s))
};

// ── PIN 설정 (변경하려면 이 값만 수정) ──
const ADMIN_PIN = '1234';

// ── 모드 관리 ──
// 항상 학생 모드로 시작 (탭 닫고 재접속 시 초기화)
sessionStorage.removeItem('ch_admin');
let IS_ADMIN = false;

function setMode(mode){
  IS_ADMIN = mode==='admin';
  sessionStorage.setItem('ch_admin', IS_ADMIN?'1':'0');
  document.getElementById('mtab-student').classList.toggle('on', !IS_ADMIN);
  document.getElementById('mtab-admin').classList.toggle('on', IS_ADMIN);
  render();
}

function tryAdmin(){
  // 이미 어드민이면 학생으로 전환
  if(IS_ADMIN){ setMode('student'); return; }
  // PIN 모달 표시
  showPinModal();
}

function showPinModal(){
  // 기존 모달 제거
  const existing = document.getElementById('pinModal');
  if(existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'pinModal';
  modal.className = 'modal-bg';
  modal.innerHTML = '<div class="modal-box">'
    +'<div class="modal-title">🔑 선생님 확인</div>'
    +'<div class="modal-sub">PIN 번호를 입력하세요</div>'
    +'<input class="pin-input" id="pinInp" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key===\'Enter\')checkPin()">'
    +'<button class="btn btn-blue btn-full" style="margin-top:0;" onclick="checkPin()">확인</button>'
    +'<button class="btn btn-gray btn-full" style="margin-top:8px;" onclick="closePinModal()">취소</button>'
    +'</div>';

  // 배경 클릭 시 닫기
  modal.addEventListener('click', function(e){ if(e.target===modal)closePinModal(); });
  document.body.appendChild(modal);
  setTimeout(()=>{ const el=document.getElementById('pinInp'); if(el)el.focus(); }, 80);
}

function checkPin(){
  const inp = document.getElementById('pinInp');
  const val = inp ? inp.value : '';
  if(val === ADMIN_PIN){
    closePinModal();
    setMode('admin');
  } else {
    if(inp){
      inp.classList.add('err');
      inp.value='';
      setTimeout(()=>inp.classList.remove('err'), 400);
      inp.focus();
    }
    toast('PIN이 틀렸어요');
  }
}

function closePinModal(){
  const modal = document.getElementById('pinModal');
  if(modal) modal.remove();
}

function aTabBar(){
  const cA=aTab==='create', vA=aTab==='view', sA=aTab==='status';
  return '<div class="atabs">'
    +'<button data-tab="create" class="atab'+(cA?' on':'')+'" onclick="aTab=this.dataset.tab;renderAList()">➕ 새 시험</button>'

    +'</div>';

async function renderAList(){
  W('<div class="loading"><div class="spinner"></div></div>');
  let exams=[];
  try{ exams=await tfDB.getExams(); if(!Array.isArray(exams)) throw new Error(JSON.stringify(exams)); }
  catch(e){ W('<div class="empty">⚠️ 로드 실패<br><small>'+e.message+'</small></div>'); return; }
  const sl=schools.get();
  const opts=sl.map(s=>'<option value="'+s+'"'+(s===aTempSchool?' selected':'')+'>'+s+'</option>').join('');

  if(aTab==='create'){
    W(aTabBar()+'<div class="card"><div class="sec-title">새 시험 만들기</div>'
      +'<div class="lbl">학교</div><div class="sel-wrap"><select class="sel" id="aSchool" onchange="aTempSchool=this.value">'+opts+'</select></div>'
      +'<div class="lbl">시험 이름</div><input class="inp" id="aName" placeholder="예) 3월 4주차 Test" value="'+aTempName+'">'
      +'<div class="lbl">문항 수</div><input class="inp inp-sm" id="aQ" type="number" min="1" max="60" value="'+aTempQ+'">'
      +'<button class="btn btn-blue btn-full" onclick="goACreate()">정답 등록하기 →</button></div>');
    return;
  }
  if(aTab==='status'){ renderStatusTab(); return; }

  const grouped={};
  sl.forEach(s=>grouped[s]=[]);
  exams.forEach(e=>{ const s=e.school||'기본'; if(!grouped[s])grouped[s]=[]; grouped[s].push(e); });
  const allS=[...new Set([...sl,...Object.keys(grouped)])];
  const filterChips=['전체',...allS].map(s=>{
    const on=aFilterSchool===s;
    return '<button data-school="'+s+'" onclick="aFilterSchool=this.dataset.school;renderAList()" style="padding:6px 14px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;background:'+(on?'#2f7af5':'white')+';color:'+(on?'white':'rgba(28,28,30,0.55)')+';border-color:'+(on?'#2f7af5':'rgba(0,0,0,0.1)')+';">'+s+'</button>';
  }).join('');

  let h=aTabBar()
    +'<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;">'+filterChips+'</div>'
    +'<div style="display:flex;justify-content:flex-end;margin-bottom:10px;"><button class="btn btn-gray" onclick="aStep=\'schools\';render()">🏫 학교 관리</button></div>';

  const showS=aFilterSchool==='전체'?allS:[aFilterSchool];
  let hasAny=false;
  showS.forEach(school=>{
    const list=grouped[school]||[];
    if(!list.length)return; hasAny=true;
    const fid='f_'+school.replace(/\W/g,'_');
    if(aFilterSchool==='전체'){
      h+='<div style="margin-bottom:14px;">'
        +'<div style="display:flex;align-items:center;gap:8px;padding:11px 14px;background:white;border-radius:12px;border:1px solid rgba(0,0,0,0.08);margin-bottom:6px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,0.05);" onclick="toggleF(\''+fid+'\')">'
        +'<span style="font-size:18px;">🏫</span><span style="font-size:14px;font-weight:700;flex:1;">'+school+'</span>'
        +'<span style="font-size:12px;color:rgba(28,28,30,0.45);">'+list.length+'개</span>'
        +'<span class="school-arrow open" id="ar_'+fid+'">›</span></div>'
        +'<div class="school-exams open" id="'+fid+'" style="padding-left:10px;">'+tfExamListHTML(list,school)+'</div></div>';
    } else { h+=tfExamListHTML(list,school); }
  });
  if(!hasAny) h+='<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📋</div>시험이 없어요</div>';
  W(h);
}

function tfExamListHTML(list,school){
  let html='';
  list.forEach(function(e,i){
    const safe=e.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const sLabel=aFilterSchool==='전체'?'':' · '+(e.school||'기본');
    html+='<div class="exam-item" data-id="'+e.id+'">'
      +'<div class="ord-btns">'
      +'<button class="ord-btn" '+(i===0?'disabled':'')+' onclick="tfMoveE(\''+e.id+'\',\''+school+'\','+i+',-1,event)">▲</button>'
      +'<button class="ord-btn" '+(i===list.length-1?'disabled':'')+' onclick="tfMoveE(\''+e.id+'\',\''+school+'\','+i+',1,event)">▼</button>'
      +'</div>'
      +'<div style="flex:1;cursor:pointer;min-width:0;" onclick="goADetail(\''+e.id+'\')">'
      +'<div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+e.name+'</div>'
      +'<div style="font-size:12px;color:rgba(28,28,30,0.45);margin-top:2px;">'+e.questions+'문항'+sLabel+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:2px;flex-shrink:0;">'
      +'<button style="background:none;border:none;cursor:pointer;padding:6px 8px;font-size:15px;color:rgba(28,28,30,0.4);" onclick="quickEdit(\''+e.id+'\')">✏️</button>'
      +'<button style="background:none;border:none;cursor:pointer;padding:6px 8px;font-size:15px;color:rgba(28,28,30,0.4);" onclick="quickDel(\''+e.id+'\',\''+safe+'\')">🗑️</button>'
      +'</div></div>';
  });
  return html;
}

function toggleF(id){
  const el=document.getElementById(id),ar=document.getElementById('ar_'+id);
  if(!el)return;
  el.classList.toggle('open');
  if(ar)ar.classList.toggle('open');
}

async function tfMoveE(id,school,idx,dir,ev){
  ev.stopPropagation();
  const exams=await tfDB.getExams();
  const list=exams.filter(x=>(x.school||'기본')===school).sort((a,b)=>(a.order_index||0)-(b.order_index||0));
  const tgt=idx+dir; if(tgt<0||tgt>=list.length)return;
  const a=list[idx],b=list[tgt];
  await tfDB.patchOrder(a.id,b.order_index??tgt);
  await tfDB.patchOrder(b.id,a.order_index??idx);
  renderAList();
}

function goACreate(){
  const name=document.getElementById('aName').value.trim();
  const q=parseInt(document.getElementById('aQ').value);
  const school=document.getElementById('aSchool')?.value||aTempSchool;
  if(!name){toast('시험 이름을 입력해주세요');return;}

  aTempName=name;aTempQ=q;aTempSchool=school;

    const on=aTempStudents.includes(s.name);

      +'<td><button class="tfb '+(a==='F'?'f-on':'')+'" onclick="setAns('+i+',\'F\')">F</button></td></tr>';
  }
  W('<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">'
    +'<button class="btn btn-gray" onclick="aStep=\'list\';aEditId=\'\';render()">← 뒤로</button>'
    +'<div><div style="font-size:15px;font-weight:700;">'+aTempName+'</div>'
    +'<div style="font-size:12px;color:rgba(28,28,30,0.5);" id="fillCnt">'+filled+'/'+aTempQ+' 등록됨 · '+aTempSchool+'</div></div></div>'
    +(aEditId?'<div class="card" style="padding:14px 18px;"><div class="lbl">학교 변경</div><div class="sel-wrap" style="margin:0;"><select class="sel" id="editSchool" onchange="aTempSchool=this.value">'+schoolOpts+'</select></div></div>':'')

      ?'<div style="display:flex;flex-wrap:wrap;gap:6px;">'+allBtn+studBtns+'</div>'
      :'<div style="font-size:12px;color:rgba(28,28,30,0.4);">학교 관리에서 학생을 먼저 추가해주세요</div>')
    +'</div>'
    +'<div class="card"><div class="sec-title">정답 체크</div>'
    +'<table class="tbl"><thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead><tbody id="ansBody">'+rows+'</tbody></table>'

function toggleAStudent(name){
  const idx=aTempStudents.indexOf(name);
  if(idx>=0)aTempStudents.splice(idx,1);
  else aTempStudents.push(name);
  renderAAnswers();
}
async function toggleAAllStudents(){
  let studs=[];
  try{ studs=await studentsDB.getBySchool(aTempSchool); if(!Array.isArray(studs))studs=[]; }catch(e){}
  if(aTempStudents.length===studs.length) aTempStudents=[];
  else aTempStudents=studs.map(s=>s.name);
  renderAAnswers();
}

function setAns(i,v){
  aTempAnswers[i]=v;
  const tb=document.getElementById('ansBody');if(!tb){render();return;}
  const row=tb.querySelectorAll('tr')[i];if(!row)return;
  const bt=row.querySelectorAll('.tfb');
  bt[0].className='tfb '+(v==='T'?'t-on':'');

  const res=await tfDB.saveExam({id,name:aTempName,questions:aTempQ,answers:aTempAnswers.slice(0,aTempQ),createdAt:Date.now(),school:aTempSchool,order_index:0,students:aTempStudents});

  toast('시험이 저장됐어요 ✅');

async function renderSList(){
  W('<div class="loading"><div class="spinner"></div></div>');

  let doneIds=new Set();
  try{
    const allR=await api.get('results?student_name=eq.'+encodeURIComponent(sName));

  }catch(e){}

  let h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">'
    +'<button class="btn btn-gray" onclick="sStep=\'entry\';render()">← 뒤로</button>'
    +'<div><div style="font-size:15px;font-weight:700;">🏫 '+sSchool+'</div>'
    +'<div style="font-size:12px;color:rgba(28,28,30,0.5);">'+sName+'님, 시험을 선택하세요</div></div></div>';

  if(!exams||!exams.length){
    h+='<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📋</div>진행 중인 시험이 없어요</div>';
  } else {
    exams.forEach(e=>{
      const done=doneIds.has(e.id);

          +'<div class="e-icon e-icon-s">✏️</div>'
          +'<div style="flex:1;"><div style="font-size:14px;font-weight:700;">'+e.name+'</div>'
          +'<div style="font-size:12px;color:rgba(28,28,30,0.55);margin-top:2px;">'+e.questions+'문항</div></div>'
          +'<div style="color:rgba(28,28,30,0.3);font-size:20px;">›</div></div>';

async function goSExam(id){
  W('<div class="loading"><div class="spinner"></div></div>');
  const exams=await tfDB.getExams();
  sExamData=exams.find(x=>x.id===id);
  sExamId=id;sAnswers=new Array(sExamData.questions).fill('');sFixMode=false;
  sStep='exam';render();
}

function renderSExam(){
  const e=sExamData;
  const filled=sAnswers.filter(a=>a).length;
  let rows='';
  for(let i=0;i<e.questions;i++){
    const a=sAnswers[i]||'';
    rows+='<tr><td class="c0">'+(i+1)+'</td>'
      +'<td class="c1"><button class="tfb '+(a==='T'?'t-on':'')+'" onclick="pickS('+i+',\'T\')">T</button></td>'
      +'<td><button class="tfb '+(a==='F'?'f-on':'')+'" onclick="pickS('+i+',\'F\')">F</button></td></tr>';
  }
  const banner=sFixMode?'<div class="fix-banner">🔄 이전 답안이 그대로 있어요. 수정하고 싶은 문항을 바꿔서 다시 제출하세요!</div>':'';
  W(banner
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">'

    +'<div style="font-size:12px;color:rgba(28,28,30,0.5);margin-top:1px;" id="sFill">✏️ '+sName+' · '+filled+'/'+e.questions+' 체크</div></div></div>'
    +'<div class="card"><table class="tbl"><thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead><tbody id="sBody">'+rows+'</tbody></table></div>'
    +'<button class="btn btn-green btn-full" onclick="doSubmit()">'+(sFixMode?'다시 제출하기 →':'제출하기 →')+'</button>'
    +'<div style="font-size:12px;color:rgba(28,28,30,0.45);text-align:center;margin-top:10px;">모든 문항을 체크한 후 제출하세요</div>');

function pickS(i,v){
  sAnswers[i]=v;
  const tb=document.getElementById('sBody');if(!tb){render();return;}
  tb.querySelectorAll('tr').forEach(row=>{
    const nc=row.querySelector('.c0');if(!nc)return;
    if(parseInt(nc.textContent)-1!==i)return;
    const bt=row.querySelectorAll('.tfb');
    bt[0].className='tfb '+(v==='T'?'t-on':'');
    bt[1].className='tfb '+(v==='F'?'f-on':'');
  });
  const fc=document.getElementById('sFill');
  if(fc)fc.textContent='✏️ '+sName+' · '+sAnswers.filter(a=>a).length+'/'+sExamData.questions+' 체크';
}

async function doSubmit(){
  const e=sExamData;
  const filled=sAnswers.filter(a=>a).length;
  if(filled<e.questions){toast(e.questions-filled+'문항이 남았어요');return;}
  let score=0;
  for(let i=0;i<e.questions;i++)if(sAnswers[i]===e.answers[i])score++;
  W('<div class="loading">📤 제출 중...</div>');
  const res=await tfDB.saveResult(sExamId,sName,{answers:sAnswers.slice(),score,total:e.questions,submittedAt:Date.now()});
  if(!res.ok){toast('제출 실패, 다시 시도해주세요');sStep='exam';render();return;}
  sFixMode=false;sStep='result';render();
}

async function renderSResult(){
  W('<div class="loading"><div class="spinner"></div></div>');
  const results=await tfDB.getResults(sExamId);
  const r=results.find(x=>x.student_name===sName);
  if(!r){sStep='list';render();return;}
  window._prevResult=r;
  const pct=Math.round(r.score/r.total*100),wrong=r.total-r.score;
  const col=pct>=80?'#1a9e45':pct>=60?'#c4600a':'#d93025';
  const msg=pct>=90?'🎉 훌륭해요!':pct>=70?'👍 잘했어요!':pct>=50?'😊 조금만 더!':'💪 다시 도전!';
  const wrongText=wrong>0?'<span style="color:#d93025;font-weight:600;">'+wrong+'개 틀림</span>':'전부 정답! 🎯';
  const retryBtn=wrong>0?'<button class="btn btn-orange btn-full" style="margin:0;" onclick="goRetry()">🔄 다시 풀기</button>':'';
  W('<div class="score-box"><div style="font-size:26px;margin-bottom:8px;">'+msg+'</div>'
    +'<div class="score-num" style="color:'+col+'">'+r.score+' / '+r.total+'</div>'
    +'<div class="score-sub">'+sName+' · '+wrongText+'</div>'
    +'<div class="bar-bg" style="margin-top:12px;"><div class="bar-fg" style="width:'+pct+'%;background:'+col+';"></div></div></div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">'+retryBtn
    +'<button class="btn btn-gray btn-full" style="margin:0;" onclick="sStep=\'list\';render()">✓ 완료</button></div>');
}

function goRetry(){
  sAnswers=window._prevResult.answers.slice();
  sFixMode=true;sStep='exam';render();
}

    +'<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;">'+filterChips+'</div>'

    const list=grouped[school]||[];
    if(!list.length)return; hasAny=true;
    const fid='wf_'+school.replace(/\W/g,'_');

async function wMoveE(id,school,idx,dir,ev){
  ev.stopPropagation();
  const exams=await wDB.getExams();
  const list=exams.filter(x=>(x.school||'기본')===school).sort((a,b)=>(a.order_index||0)-(b.order_index||0));
  const tgt=idx+dir; if(tgt<0||tgt>=list.length)return;
  const a=list[idx],b=list[tgt];
  await wDB.patchOrder(a.id,b.order_index??tgt);

  renderWAList();
}

function wAddPairAndFocus(){
  // 현재 입력된 값 저장

  pairs.forEach(function(row,i){
    const inputs=row.querySelectorAll('.inp');
    if(waTempWords[i]){
      waTempWords[i].ko=inputs[0]?inputs[0].value:'';

  });

async function extractWAWords(b64){
  const container=document.getElementById('wPairsContainer');
  if(container) container.innerHTML='<div style="text-align:center;padding:20px;"><div class="spinner" style="width:28px;height:28px;margin:0 auto 8px;"></div>AI가 단어를 읽는 중...</div>';
  const prompt='이 이미지는 영어 단어시험 정답지입니다.\n한글 뜻과 영어 단어 쌍을 모두 추출해주세요.\n반드시 JSON만 응답:\n{"words":[{"ko":"한글뜻","en":"english"},...]}';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})
    });
    const data=await res.json();
    const parsed=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    if(parsed.words&&parsed.words.length){ waTempWords=parsed.words; renderWACreate(); toast('✅ '+parsed.words.length+'개 단어를 읽었어요!'); }
    else{ toast('직접 입력해주세요.'); renderWACreate(); }
  }catch(e){ toast('사진 인식 실패. 직접 입력해주세요.'); renderWACreate(); }
}

async function saveWExam(){
  const nameEl=document.getElementById('waName2');
  const name=nameEl?nameEl.value.trim():waTempName;
  const schoolEl=document.getElementById('waSchool2');
  const school=schoolEl?schoolEl.value:waTempSchool;
  const pairs=document.querySelectorAll('#wPairsContainer .word-pair');
  const words=[];
  pairs.forEach(row=>{
    const inputs=row.querySelectorAll('.inp');
    const ko=inputs[0]?inputs[0].value.trim():'';
    const en=inputs[1]?inputs[1].value.trim():'';
    if(ko||en)words.push({ko,en});
  });
  if(!name){toast('시험 이름을 입력해주세요');return;}
  if(!words.length){toast('단어를 1개 이상 입력해주세요');return;}
  W('<div class="loading">💾 저장 중...</div>');
  const id=waEditId||'wexam_'+Date.now();
  const res=await wDB.saveExam({id,name,words,school,order_index:0,createdAt:Date.now(),exam_type:waTempType,students:waTempStudents});
  if(!res.ok){toast('저장 실패');renderWACreate();return;}
  toast('✅ 저장됐어요!');
  waEditId='';waTempName='';waTempSchool='기본';waTempWords=[];waTempImgB64='';waTempType='ko_to_en';waTempStudents=[];
  waStep='detail';waDetailId=id;render();
}

async function goWSExam(id){
  W('<div class="loading"><div class="spinner"></div></div>');
  const exams=await wDB.getExams();
  wsExamData=exams.find(x=>x.id===id);
  wsExamId=id;
  const examType=wsExamData.exam_type||'ko_to_en';
  wsShuffled=[...(wsExamData.words||[])].sort(()=>Math.random()-0.5).map(function(w){
    let dir;
    if(examType==='ko_to_en') dir='ko_to_en';
    else if(examType==='en_to_ko') dir='en_to_ko';
    else dir=Math.random()<0.5?'ko_to_en':'en_to_ko';
    return {ko:w.ko,en:w.en,dir:dir};
  });
  wsAnswers=new Array(wsShuffled.length).fill('');
  wsStep='exam';render();
}

async function doWSSubmit(){
  wsShuffled.forEach(function(w,i){
    const el=document.getElementById('wsAns_'+i);
    if(el)wsAnswers[i]=el.value.trim();
  });
  W('<div class="loading">📤 채점 중...</div>');
  const results=wsShuffled.map(function(w,i){
    const answer=(wsAnswers[i]||'').trim();
    const correct=w.dir==='ko_to_en'?w.en:w.ko;
    const ok_exact=answer.toLowerCase()===correct.toLowerCase();
    const ok_typo=!ok_exact&&w.dir==='ko_to_en'&&wsLevenshtein(answer.toLowerCase(),correct.toLowerCase())<=1;
    const ok=ok_exact||ok_typo;
    return {ko:w.ko,en:w.en,dir:w.dir,correct,written:answer,ok};
  });
  const score=results.filter(r=>r.ok).length;
  const wrongWords=results.filter(r=>!r.ok).map(r=>({ko:r.ko,en:r.en,dir:r.dir,written:r.written}));
  wsGradeResult={results};
  try{ await wDB.saveResult(wsExamId,wsName,{score,total:results.length,wrongWords,allResults:results}); }catch(e){}
  wsStep='result';render();
}

  wsRetryAnswers.push({ko:w.ko,en:w.en,dir:w.dir,correct,written:answer,ok});
  wsRetryIdx++;render();

function wsLevenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

const STATUS_PER_PAGE=10;

async function renderStatusTab(){
  W('<div class="loading"><div class="spinner"></div></div>');

  // T/F + 단어시험 전체 로드
  let tfExams=[], wExams=[];
  try{ tfExams=await tfDB.getExams(); if(!Array.isArray(tfExams))tfExams=[]; }catch(e){}
  try{ wExams=await wDB.getExams(); if(!Array.isArray(wExams))wExams=[]; }catch(e){}

  // 모든 결과 로드
  let tfResults=[], wResults=[];
  try{ tfResults=await api.get('results?order=submitted_at.desc'); if(!Array.isArray(tfResults))tfResults=[]; }catch(e){}
  try{ wResults=await api.get('word_results?order=submitted_at.desc'); if(!Array.isArray(wResults))wResults=[]; }catch(e){}

  // 응시 이력 있는 시험만 추출
  const tfSubmitted=new Set(tfResults.map(r=>r.exam_id));
  const wSubmitted=new Set(wResults.map(r=>r.exam_id));

  // 통합 시험 목록 (응시 이력 있는 것만, 최신순)
  let allExams=[];
  tfExams.forEach(e=>{ if(tfSubmitted.has(e.id)) allExams.push({...e, _type:'tf'}); });
  wExams.forEach(e=>{ if(wSubmitted.has(e.id)) allExams.push({...e, _type:'word'}); });

  // 최신 응시일 기준 정렬
  allExams.sort(function(a,b){
    const rA=(a._type==='tf'?tfResults:wResults).filter(r=>r.exam_id===a.id);
    const rB=(b._type==='tf'?tfResults:wResults).filter(r=>r.exam_id===b.id);
    const tA=rA.length?Math.max(...rA.map(r=>r.submitted_at||0)):0;
    const tB=rB.length?Math.max(...rB.map(r=>r.submitted_at||0)):0;
    return tB-tA;
  });

  // 학교별 학생 목록 구성 (전체 결과에서 추출)
  const allStudents=new Map(); // school → Set of names
  [...tfResults,...wResults].forEach(r=>{
    const exam=[...tfExams,...wExams].find(e=>e.id===r.exam_id);
    const school=exam?(exam.school||'기본'):'기본';
    if(!allStudents.has(school))allStudents.set(school,new Set());
    allStudents.get(school).add(r.student_name);
  });

  // 필터 적용
  const filtered = statusFilter==='all' ? allExams
    : statusFilter==='tf' ? allExams.filter(e=>e._type==='tf')
    : allExams.filter(e=>e._type==='word');

  // 페이지네이션
  const totalPages=Math.max(1,Math.ceil(filtered.length/STATUS_PER_PAGE));
  if(statusPage>totalPages)statusPage=1;
  const pageItems=filtered.slice((statusPage-1)*STATUS_PER_PAGE, statusPage*STATUS_PER_PAGE);

  // 필터 칩
  const chips=['all','tf','word'].map(function(f){
    const on=statusFilter===f;
    const label=f==='all'?'전체':f==='tf'?'T/F 시험':'단어시험';
    return '<button data-f="'+f+'" onclick="statusFilter=this.dataset.f;statusPage=1;renderStatusTab()" style="padding:6px 14px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;background:'+(on?'#2f7af5':'white')+';color:'+(on?'white':'rgba(28,28,30,0.55)')+';border-color:'+(on?'#2f7af5':'rgba(0,0,0,0.1)')+';">'+label+'</button>';
  }).join('');

  // 카드 생성
  let cardsHTML='';
  if(!pageItems.length){
    cardsHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📋</div>응시 이력이 있는 시험이 없어요</div>';
  } else {
    pageItems.forEach(function(exam){
      const results=(exam._type==='tf'?tfResults:wResults).filter(r=>r.exam_id===exam.id);
      // students 컬럼 우선, 없으면 결과에서 추출
      const students=Array.isArray(exam.students)&&exam.students.length>0
        ? exam.students
        : [...new Set(results.map(r=>r.student_name))];

      // 3분류
      const done=[], prog=[], none=[];
      students.forEach(function(name){
        const rList=results.filter(r=>r.student_name===name);
        if(!rList.length){ none.push(name); return; }
        const best=rList.reduce((a,b)=>(a.score/a.total>b.score/b.total?a:b));
        if(parseInt(best.score)===parseInt(best.total)&&best.total>0) done.push(name);
        else prog.push(name);
      });

      const allDone=done.length===students.length&&students.length>0;
      const typeLabel=exam._type==='tf'?'T/F':'단어';
      const typeBg=exam._type==='tf'?'rgba(107,63,240,0.1)':'rgba(47,122,245,0.1)';
      const typeColor=exam._type==='tf'?'#6b3ff0':'#2f7af5';
      const cardId='sc_'+exam.id.replace(/\W/g,'_');

      const summaryDots=''
        +(done.length?'<span style="font-size:12px;font-weight:700;color:#1a9e45;">● '+done.length+'</span> ':'')
        +(prog.length?'<span style="font-size:12px;font-weight:700;color:#c4600a;">● '+prog.length+'</span> ':'')
        +(none.length?'<span style="font-size:12px;font-weight:700;color:#d93025;">● '+none.length+'</span>':'');

      const cardStyle=allDone?'opacity:0.55;':'';

      cardsHTML+='<div style="'+cardStyle+'background:white;border-radius:16px;border:1px solid rgba(0,0,0,0.08);margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.05);overflow:hidden;">'
        // 헤더
        +'<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;" onclick="toggleStatusCard(\''+cardId+'\')">'
        +'<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:'+typeBg+';color:'+typeColor+';flex-shrink:0;">'+typeLabel+'</span>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+exam.name+'</div>'
        +'<div style="font-size:11px;color:rgba(28,28,30,0.4);margin-top:2px;">'+school+'</div>'
        +'</div>'
        +'<div style="display:flex;gap:5px;align-items:center;flex-shrink:0;">'+summaryDots+'</div>'
        +'<span id="ch_'+cardId+'" style="font-size:14px;color:rgba(28,28,30,0.3);margin-left:6px;transition:transform 0.2s;display:inline-block;">›</span>'
        +'</div>'
        // 바디 (접힘)
        +'<div id="'+cardId+'" style="display:none;border-top:1px solid rgba(0,0,0,0.06);padding:14px 16px;">'
        +renderStatusNames('완료 (100점)', done, '#1a9e45', 'rgba(26,158,69,0.1)')
        +renderStatusNames('응시 중', prog, '#c4600a', 'rgba(196,96,10,0.1)')
        +renderStatusNames('미응시', none, '#d93025', 'rgba(217,48,37,0.1)')
        +'</div>'
        +'</div>';
    });
  }

  // 페이지네이션
  let pagHTML='';
  if(totalPages>1){
    pagHTML='<div style="display:flex;justify-content:center;gap:6px;margin-top:16px;">';
    for(let p=1;p<=totalPages;p++){
      const on=p===statusPage;
      pagHTML+='<button data-p="'+p+'" onclick="statusPage=parseInt(this.dataset.p);renderStatusTab()" style="width:32px;height:32px;border-radius:8px;border:1.5px solid;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:'+(on?'#2f7af5':'white')+';color:'+(on?'white':'rgba(28,28,30,0.55)')+';border-color:'+(on?'#2f7af5':'rgba(0,0,0,0.1)')+';">'+p+'</button>';
    }
    pagHTML+='</div>';
  }

  W(statusTabBar()
    +'<div style="display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;">'+chips+'</div>'
    +cardsHTML+pagHTML);
}

function renderStatusNames(label, names, color, bg){
  if(!names.length) return '';
  return '<div style="margin-bottom:10px;">'
    +'<div style="font-size:10px;font-weight:700;color:'+color+';letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;">● '+label+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px;">'
    +names.map(n=>'<span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:'+bg+';color:'+color+';">'+n+'</span>').join('')
    +'</div></div>';
}

function toggleStatusCard(id){
  const body=document.getElementById(id);
  const chevron=document.getElementById('ch_'+id);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(chevron)chevron.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}

// ── 시작 ──
render();
</script>

</body>
