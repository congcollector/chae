<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CHAESUNBE · T/F 시험</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: #f2f2f7; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; color: #1c1c1e; -webkit-font-smoothing: antialiased; }

.hdr { background: rgba(242,242,247,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.hdr-logo { font-size: 9px; letter-spacing: 2px; color: #2f7af5; text-transform: uppercase; font-weight: 600; opacity: 0.8; }
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.pill { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }
.pill-admin { background: linear-gradient(135deg, #2f7af5, #6b3ff0); color: white; }
.pill-student { background: linear-gradient(135deg, #1a9e45, #158a3a); color: white; }

.wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

.card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.sec-title { font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.sec-title::after { content: ‘’; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }

.lbl { font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.55); margin-bottom: 5px; }
.inp { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 14px; font-family: inherit; color: #1c1c1e; outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
.inp:focus { border-color: #2f7af5; }
.inp-sm { width: 90px; text-align: center; }

.btn { padding: 13px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-full { width: 100%; margin-top: 6px; display: block; }
.btn-blue  { background: linear-gradient(135deg, #2f7af5, #6b3ff0); color: white; box-shadow: 0 2px 12px rgba(47,122,245,0.25); }
.btn-green { background: linear-gradient(135deg, #1a9e45, #158a3a); color: white; box-shadow: 0 2px 12px rgba(26,158,69,0.2); }
.btn-gray  { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); color: rgba(28,28,30,0.55); }
.btn-red   { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: rgba(217,48,37,0.1); border: 1.5px solid rgba(217,48,37,0.2); color: #d93025; }

.tbl { width: 100%; border-collapse: collapse; }
.tbl th { padding: 9px 6px; text-align: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); background: #f2f2f7; border-bottom: 1.5px solid rgba(0,0,0,0.08); }
.tbl th.c0 { width: 42px; border-right: 1px solid rgba(0,0,0,0.08); }
.tbl th.c1 { border-right: 1px solid rgba(0,0,0,0.08); }
.tbl td { padding: 7px 6px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
.tbl td.c0 { font-size: 12px; font-weight: 700; color: rgba(28,28,30,0.35); border-right: 1px solid rgba(0,0,0,0.06); }
.tbl td.c1 { border-right: 1px solid rgba(0,0,0,0.06); }
.tbl tr:last-child td { border-bottom: none; }

.tfb { width: 100%; padding: 9px 4px; border-radius: 9px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 13px; font-weight: 700; cursor: pointer; color: rgba(28,28,30,0.5); font-family: inherit; transition: all 0.12s; }
.tfb:active { transform: scale(0.9); }
.t-on { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.f-on { background: #fdf0ee; border-color: #d93025; color: #d93025; }
.ok   { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.no   { background: rgba(100,100,100,0.08); border-color: rgba(100,100,100,0.2); color: rgba(100,100,100,0.5); text-decoration: line-through; }
.hint { background: rgba(47,122,245,0.08); border-color: rgba(47,122,245,0.4); color: #2f7af5; }

.score-box { text-align: center; padding: 28px 20px; background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 12px; }
.score-num { font-size: 56px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
.score-sub { font-size: 14px; color: rgba(28,28,30,0.55); margin-bottom: 16px; }
.bar-bg { background: #f2f2f7; border-radius: 20px; height: 8px; overflow: hidden; }
.bar-fg { height: 100%; border-radius: 20px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

.exam-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; margin-bottom: 8px; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: transform 0.12s; }
.exam-item:active { transform: scale(0.98); }
.e-icon { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.e-icon-a { background: linear-gradient(135deg,#2f7af5,#6b3ff0); }
.e-icon-s { background: linear-gradient(135deg,#1a9e45,#158a3a); }

.res-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; }
.res-row:last-child { border-bottom: none; }
.res-av { width: 36px; height: 36px; border-radius: 10px; background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); flex-shrink: 0; text-align: center; line-height: 1.2; word-break: keep-all; padding: 0 2px; }
.score-pill { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.sp-hi { background: rgba(26,158,69,0.1);  color: #1a9e45; }
.sp-md { background: rgba(196,96,10,0.1);  color: #c4600a; }
.sp-lo { background: rgba(217,48,37,0.1);  color: #d93025; }

.name-screen { padding: 44px 20px 20px; text-align: center; }
.name-inp { width: 100%; padding: 15px 16px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 20px; font-family: inherit; color: #1c1c1e; outline: none; text-align: center; margin-bottom: 14px; transition: border-color 0.2s; }
.name-inp:focus { border-color: #2f7af5; }

.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 14px; }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.35); cursor: pointer; border-bottom: 2px solid transparent; }
.tab-on { color: #2f7af5; border-bottom-color: #2f7af5; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.96); color: white; padding: 11px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.t-show { opacity: 1; }

.empty { text-align: center; padding: 50px 20px; color: rgba(28,28,30,0.45); }
.loading { text-align: center; padding: 60px 20px; color: rgba(28,28,30,0.45); font-size: 14px; }
.link-box { background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(28,28,30,0.5); }
.dot { width: 10px; height: 10px; border-radius: 50%; }
</style>

</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">Chaesunbe Academy</div>
    <div class="hdr-title">CHAESUNBE</div>
  </div>
  <div class="pill" id="modePill"></div>
</div>

<div class="wrap" id="wrap"><div class="loading">⏳ 불러오는 중...</div></div>
<div class="toast" id="toast"></div>

<script>
// ── Supabase 설정 ──
const SUPA_URL = 'https://pithlzhuqezeesprcbze.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';

const BASE_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type': 'application/json',
};

const api = (path, opts={}) => {
  const { headers: extraHeaders, prefer, ...rest } = opts;
  return fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...rest,
    headers: {
      ...BASE_HEADERS,
      'Prefer': prefer || 'return=representation',
      ...(extraHeaders || {})
    }
  });
};

const db = {
  async getExams() {
    const r = await api('exams?order=created_at.desc');
    return await r.json();
  },
  async saveExam(exam) {
    return await api('exams', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=representation',
      body: JSON.stringify({
        id: exam.id,
        name: exam.name,
        questions: exam.questions,
        answers: exam.answers,
        created_at: exam.createdAt
      })
    });
  },
  async deleteExam(id) {
    await api(`exams?id=eq.${id}`, { method: 'DELETE', prefer: '' });
    await api(`results?exam_id=eq.${id}`, { method: 'DELETE', prefer: '' });
  },
  async getResults(examId) {
    const r = await api(`results?exam_id=eq.${examId}&order=score.desc`);
    return await r.json();
  },
  async saveResult(examId, studentName, data) {
    // upsert by exam_id + student_name
    await api(`results?exam_id=eq.${examId}&student_name=eq.${encodeURIComponent(studentName)}`,
      { method: 'DELETE', prefer: '' });
    return await api('results', {
      method: 'POST',
      body: JSON.stringify({
        exam_id: examId,
        student_name: studentName,
        answers: data.answers,
        score: data.score,
        total: data.total,
        submitted_at: data.submittedAt
      })
    });
  }
};

// ── 모드 결정 ──
const ADMIN_HASH = '#admin-chaesunbe';
const IS_ADMIN   = location.hash === ADMIN_HASH;
const pill       = document.getElementById('modePill');
pill.textContent = IS_ADMIN ? '선생님 🔑' : '학생 ✏️';
pill.className   = 'pill ' + (IS_ADMIN ? 'pill-admin' : 'pill-student');

// ── STATE ──
let aStep = 'list';
let aDetailId = '', aDetailStudent = '', aDetailTab = 'results';
let aTempName = '', aTempQ = 10, aTempAnswers = [], aEditId = '';
let sExamId = '', sExamData = null, sName = '', sAnswers = [], sStep = 'list';

// ── RENDER ──
function render() {
  if (IS_ADMIN) renderAdmin(); else renderStudent();
}

// ══════════════════════════════
// ADMIN
// ══════════════════════════════
function renderAdmin() {
  if      (aStep === 'list')    renderAList();
  else if (aStep === 'answers') renderAAnswers();
  else if (aStep === 'detail')  renderADetail();
  else if (aStep === 'studet')  renderAStudentDetail();
}

async function renderAList() {
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams = await db.getExams();
  let h = `<div class="card">
    <div class="sec-title">새 시험 만들기</div>
    <div class="lbl">시험 이름</div>
    <input class="inp" id="aName" placeholder="예) 3월 4주차 Test / Unit 5" value="${aTempName}">
    <div class="lbl">문항 수</div>
    <input class="inp inp-sm" id="aQ" type="number" min="1" max="60" value="${aTempQ}">
    <button class="btn btn-blue btn-full" onclick="goACreate()">정답 등록하기 →</button>
  </div>`;
  if (exams.length) {
    h += `<div class="sec-title" style="margin-top:4px;">시험 목록</div>`;
    h += exams.map(e => `<div class="exam-item" onclick="goADetail('${e.id}')">
      <div class="e-icon e-icon-a">📝</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;">${e.name}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.55);margin-top:2px;">${e.questions}문항</div>
      </div>
      <div style="color:rgba(28,28,30,0.3);font-size:20px;">›</div>
    </div>`).join('');
  } else {
    h += `<div class="empty"><div style="font-size:40px;margin-bottom:12px;">📋</div><div>아직 만든 시험이 없어요</div></div>`;
  }
  W(h);
}

function goACreate() {
  const name = document.getElementById('aName').value.trim();
  const q    = parseInt(document.getElementById('aQ').value);
  if (!name) { toast('시험 이름을 입력해주세요'); return; }
  if (!q || q < 1) { toast('문항 수를 입력해주세요'); return; }
  aTempName = name; aTempQ = q;
  if (!aEditId) aTempAnswers = new Array(q).fill('');
  aStep = 'answers'; render();
}

function renderAAnswers() {
  const filled = aTempAnswers.filter(x => x === 'T' || x === 'F').length;
  let rows = '';
  for (let i = 0; i < aTempQ; i++) {
    const a = aTempAnswers[i] || '';
    rows += `<tr>
      <td class="c0">${i+1}</td>
      <td class="c1"><button class="tfb ${a==='T'?'t-on':''}" onclick="setAns(${i},'T')">T</button></td>
      <td><button class="tfb ${a==='F'?'f-on':''}" onclick="setAns(${i},'F')">F</button></td>
    </tr>`;
  }
  W(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn btn-gray" onclick="aStep='list';aEditId='';render()">← 뒤로</button>
      <div>
        <div style="font-size:15px;font-weight:700;">${aTempName}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.5);" id="fillCnt">${filled}/${aTempQ} 등록됨</div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">정답 체크</div>
      <table class="tbl">
        <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead>
        <tbody id="ansBody">${rows}</tbody>
      </table>
      <button class="btn btn-blue btn-full" style="margin-top:14px;" onclick="doSave()">${aEditId?'수정 저장 ✓':'시험 저장 →'}</button>
    </div>`);
}

function setAns(i, v) {
  aTempAnswers[i] = v;
  const tbody = document.getElementById('ansBody');
  if (!tbody) { render(); return; }
  const row  = tbody.querySelectorAll('tr')[i];
  if (!row) return;
  const btns = row.querySelectorAll('.tfb');
  btns[0].className = 'tfb ' + (v==='T' ? 't-on' : '');
  btns[1].className = 'tfb ' + (v==='F' ? 'f-on' : '');
  const fc = document.getElementById('fillCnt');
  if (fc) fc.textContent = `${aTempAnswers.filter(x=>x==='T'||x==='F').length}/${aTempQ} 등록됨`;
}

async function doSave() {
  const filled = aTempAnswers.filter(x => x==='T'||x==='F').length;
  if (filled < aTempQ) { toast(`${aTempQ}문항 모두 체크해주세요 (${filled}/${aTempQ})`); return; }
  W('<div class="loading">💾 저장 중...</div>');
  const id   = aEditId || 'exam_' + Date.now();
  const exam = { id, name: aTempName, questions: aTempQ, answers: aTempAnswers.slice(0, aTempQ), createdAt: Date.now() };
  const res  = await db.saveExam(exam);
  if (!res.ok) {
    const err = await res.text();
    toast('저장 실패: ' + err); renderAList(); return;
  }
  toast('시험이 저장됐어요 ✅');
  aEditId = ''; aTempName = ''; aTempQ = 10; aTempAnswers = [];
  goADetail(id);
}

function goADetail(id) { aDetailId=id; aDetailTab='results'; aStep='detail'; render(); }

async function renderADetail() {
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams   = await db.getExams();
  const e       = exams.find(x => x.id === aDetailId);
  if (!e) { aStep='list'; render(); return; }
  const results = await db.getResults(aDetailId);
  const avg     = results.length ? Math.round(results.reduce((s,r)=>s+r.score,0)/results.length*100/e.questions) : null;
  const sLink   = location.href.replace(location.hash, '');

  let tabH = '';
  if (aDetailTab === 'results') {
    if (!results.length) {
      tabH = `<div class="empty"><div style="font-size:40px;margin-bottom:12px;">🕐</div><div>아직 제출한 학생이 없어요</div></div>`;
    } else {
      tabH = `<div class="card" style="padding:0;overflow:hidden;">` +
        results.map(r => {
          const pct = Math.round(r.score/r.total*100);
          const cls = pct>=80?'sp-hi':pct>=60?'sp-md':'sp-lo';
          return `<div class="res-row" onclick="goAStudent('${aDetailId}','${encodeURIComponent(r.student_name)}')">
            <div class="res-av">${r.student_name.slice(0,4)}</div>
            <div style="flex:1;font-size:13px;font-weight:600;">${r.student_name}</div>
            <div style="font-size:11px;color:rgba(28,28,30,0.5);margin-right:4px;">${r.score}/${r.total}</div>
            <div class="score-pill ${cls}">${pct}점</div>
            <div style="color:rgba(28,28,30,0.3);margin-left:4px;font-size:18px;">›</div>
          </div>`;
        }).join('') + `</div>`;
    }
  } else {
    let rows = '';
    for (let i = 0; i < e.questions; i++) {
      const a = e.answers[i];
      rows += `<tr>
        <td class="c0">${i+1}</td>
        <td class="c1"><button class="tfb ${a==='T'?'t-on':''}" disabled>${a==='T'?'✓ T':'T'}</button></td>
        <td><button class="tfb ${a==='F'?'f-on':''}" disabled>${a==='F'?'✓ F':'F'}</button></td>
      </tr>`;
    }
    tabH = `<div class="card">
      <table class="tbl">
        <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <button class="btn btn-gray" style="width:100%;margin-top:12px;" onclick="doEditExam()">정답 수정</button>
    </div>`;
  }

  W(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn btn-gray" onclick="aStep='list';render()">← 목록</button>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:700;">${e.name}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.5);margin-top:1px;">${e.questions}문항${avg!==null?` · 평균 <b style="color:#2f7af5">${avg}점</b>`:''}</div>
      </div>
      <button class="btn btn-red" onclick="doDelExam()">삭제</button>
    </div>

    <div class="card">
      <div class="sec-title">학생 링크 공유</div>
      <div style="font-size:13px;color:rgba(28,28,30,0.55);margin-bottom:8px;line-height:1.6;">아래 링크를 학생들에게 공유하세요</div>
      <div class="link-box">
        <div style="flex:1;font-size:11px;color:#2f7af5;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sLink}</div>
        <div style="font-size:11px;font-weight:700;color:#2f7af5;cursor:pointer;flex-shrink:0;" onclick="copyLink('${sLink}')">복사</div>
      </div>
      <div style="font-size:11px;color:rgba(28,28,30,0.35);text-align:center;">⚠️ #admin-chaesunbe 링크는 학생에게 공유하지 마세요</div>
    </div>

    <div class="tabs">
      <div class="tab ${aDetailTab==='results'?'tab-on':''}" onclick="aDetailTab='results';renderADetail()">제출 결과 (${results.length}명)</div>
      <div class="tab ${aDetailTab==='answers'?'tab-on':''}" onclick="aDetailTab='answers';renderADetail()">정답 보기</div>
    </div>
    ${tabH}`);

  // 전역에 현재 시험 데이터 보관 (수정/삭제용)
  window._curExam = e;
}

function goAStudent(eid, enc) { aDetailId=eid; aDetailStudent=enc; aStep='studet'; render(); }

async function renderAStudentDetail() {
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams   = await db.getExams();
  const e       = exams.find(x => x.id === aDetailId);
  const name    = decodeURIComponent(aDetailStudent);
  const results = await db.getResults(aDetailId);
  const r       = results.find(x => x.student_name === name);
  if (!e || !r) { aStep='detail'; render(); return; }
  const pct = Math.round(r.score/r.total*100);
  const col = pct>=80?'#1a9e45':pct>=60?'#c4600a':'#d93025';
  let rows = '';
  for (let i = 0; i < e.questions; i++) {
    const cor=e.answers[i], giv=r.answers[i], ok=cor===giv;
    rows += `<tr>
      <td class="c0">${i+1}</td>
      <td class="c1"><button class="tfb ${giv==='T'?(ok?'ok':'no'):''}" disabled>${giv==='T'?(ok?'✓ T':'✗ T'):'T'}</button></td>
      <td><button class="tfb ${giv==='F'?(ok?'ok':'no'):''}" disabled>${giv==='F'?(ok?'✓ F':'✗ F'):'F'}</button></td>
      <td style="text-align:center;font-size:15px;">${ok?'✅':'❌'}</td>
    </tr>`;
  }
  W(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn btn-gray" onclick="aStep='detail';render()">← 뒤로</button>
      <div style="font-size:15px;font-weight:700;">${name} · 답안</div>
    </div>
    <div class="score-box">
      <div style="font-size:26px;margin-bottom:8px;">${pct>=90?'🎉':pct>=70?'👍':pct>=50?'😊':'💪'}</div>
      <div class="score-num" style="color:${col}">${pct}점</div>
      <div class="score-sub">${r.score} / ${r.total} 정답 · ${name}</div>
      <div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${col};"></div></div>
    </div>
    <div class="card">
      <table class="tbl">
        <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th><th>결과</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`);
}

function doEditExam() {
  const e = window._curExam;
  if (!e) return;
  aEditId=e.id; aTempName=e.name; aTempQ=e.questions; aTempAnswers=e.answers.slice();
  aStep='answers'; render();
}

async function doDelExam() {
  if (!confirm('삭제할까요? 결과도 함께 삭제됩니다.')) return;
  W('<div class="loading">🗑️ 삭제 중...</div>');
  await db.deleteExam(aDetailId);
  aStep='list'; render(); toast('삭제됐어요');
}

// ══════════════════════════════
// STUDENT
// ══════════════════════════════
function renderStudent() {
  if      (sStep==='list')   renderSList();
  else if (sStep==='name')   renderSName();
  else if (sStep==='exam')   renderSExam();
  else if (sStep==='result') renderSResult();
}

async function renderSList() {
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams = await db.getExams();
  let h = '';
  if (!exams.length) {
    h = `<div class="empty"><div style="font-size:40px;margin-bottom:12px;">📋</div><div>진행 중인 시험이 없어요<br><span style="font-size:12px;">선생님이 시험을 만들면 여기에 나타나요</span></div></div>`;
  } else {
    h += `<div class="sec-title">시험 선택</div>`;
    h += exams.map(e => `<div class="exam-item" onclick="goSName('${e.id}')">
      <div class="e-icon e-icon-s">✏️</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;">${e.name}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.55);margin-top:2px;">${e.questions}문항</div>
      </div>
      <div style="color:rgba(28,28,30,0.3);font-size:20px;">›</div>
    </div>`).join('');
  }
  W(h);
}

async function goSName(id) {
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams = await db.getExams();
  sExamData   = exams.find(x => x.id === id);
  sExamId = id; sName = ''; sAnswers = new Array(sExamData.questions).fill('');
  sStep = 'name'; render();
}

function renderSName() {
  const e = sExamData;
  W(`<div class="name-screen">
    <div style="font-size:36px;margin-bottom:14px;">✏️</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:6px;">${e.name}</div>
    <div style="font-size:13px;color:rgba(28,28,30,0.55);margin-bottom:28px;line-height:1.6;">${e.questions}문항<br>이름을 입력하고 시작하세요</div>
    <input class="name-inp" id="sNm" placeholder="이름 입력" maxlength="10" onkeydown="if(event.key==='Enter')doStart()">
    <button class="btn btn-green btn-full" onclick="doStart()">시험 시작 →</button>
  </div>`);
  setTimeout(() => { const el=document.getElementById('sNm'); if(el) el.focus(); }, 80);
}

function doStart() {
  const el = document.getElementById('sNm');
  const n  = el ? el.value.trim() : '';
  if (!n) { toast('이름을 입력해주세요'); return; }
  sName = n; sStep = 'exam'; render();
}

function renderSExam() {
  const e      = sExamData;
  const filled = sAnswers.filter(a=>a).length;
  let rows = '';
  for (let i = 0; i < e.questions; i++) {
    const a = sAnswers[i] || '';
    rows += `<tr>
      <td class="c0">${i+1}</td>
      <td class="c1"><button class="tfb ${a==='T'?'t-on':''}" onclick="pickS(${i},'T')">T</button></td>
      <td><button class="tfb ${a==='F'?'f-on':''}" onclick="pickS(${i},'F')">F</button></td>
    </tr>`;
  }
  W(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div>
        <div style="font-size:15px;font-weight:700;">${e.name}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.5);margin-top:1px;" id="sFill">✏️ ${sName} · ${filled}/${e.questions} 체크</div>
      </div>
    </div>
    <div class="card">
      <table class="tbl">
        <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead>
        <tbody id="sBody">${rows}</tbody>
      </table>
    </div>
    <button class="btn btn-green btn-full" onclick="doSubmit()">제출하기 →</button>
    <div style="font-size:12px;color:rgba(28,28,30,0.45);text-align:center;margin-top:10px;">모든 문항을 체크한 후 제출하세요</div>`);
}

function pickS(i, v) {
  sAnswers[i] = v;
  const tbody = document.getElementById('sBody');
  if (!tbody) { render(); return; }
  const row  = tbody.querySelectorAll('tr')[i];
  if (!row) return;
  const btns = row.querySelectorAll('.tfb');
  btns[0].className = 'tfb ' + (v==='T' ? 't-on' : '');
  btns[1].className = 'tfb ' + (v==='F' ? 'f-on' : '');
  const fc = document.getElementById('sFill');
  if (fc) fc.textContent = `✏️ ${sName} · ${sAnswers.filter(a=>a).length}/${sExamData.questions} 체크`;
}

async function doSubmit() {
  const e      = sExamData;
  const filled = sAnswers.filter(a=>a).length;
  if (filled < e.questions) { toast(`${e.questions-filled}문항이 남았어요`); return; }
  let score = 0;
  for (let i = 0; i < e.questions; i++) if (sAnswers[i]===e.answers[i]) score++;
  W('<div class="loading">📤 제출 중...</div>');
  const res = await db.saveResult(sExamId, sName, {
    answers: sAnswers.slice(), score, total: e.questions, submittedAt: Date.now()
  });
  if (!res.ok) { toast('제출 실패, 다시 시도해주세요'); sStep='exam'; render(); return; }
  sStep = 'result'; render();
}

async function renderSResult() {
  W('<div class="loading">⏳ 결과 불러오는 중...</div>');
  const results = await db.getResults(sExamId);
  const r       = results.find(x => x.student_name === sName);
  const e       = sExamData;
  if (!r) { sStep='list'; render(); return; }
  const pct = Math.round(r.score/r.total*100);
  const col = pct>=80?'#1a9e45':pct>=60?'#c4600a':'#d93025';
  const msg = pct>=90?'🎉 훌륭해요!':pct>=70?'👍 잘했어요!':pct>=50?'😊 조금만 더!':'💪 다시 도전!';
  let rows = '';
  for (let i = 0; i < e.questions; i++) {
    const cor=e.answers[i], giv=r.answers[i], ok=cor===giv;
    rows += `<tr>
      <td class="c0">${i+1}</td>
      <td class="c1">
        <button class="tfb ${giv==='T'?(ok?'ok':'no'):(cor==='T'?'hint':'')}" disabled>
          ${giv==='T'?(ok?'✓ T':'✗ T'):(cor==='T'?'→ T':'T')}
        </button>
      </td>
      <td>
        <button class="tfb ${giv==='F'?(ok?'ok':'no'):(cor==='F'?'hint':'')}" disabled>
          ${giv==='F'?(ok?'✓ F':'✗ F'):(cor==='F'?'→ F':'F')}
        </button>
      </td>
      <td style="text-align:center;font-size:15px;">${ok?'✅':'❌'}</td>
    </tr>`;
  }
  W(`<div class="score-box">
      <div style="font-size:26px;margin-bottom:8px;">${msg}</div>
      <div class="score-num" style="color:${col}">${pct}점</div>
      <div class="score-sub">${r.score} / ${r.total} 정답 · ${sName}</div>
      <div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${col};"></div></div>
    </div>
    <div class="card">
      <div class="sec-title">문항별 결과</div>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#1a9e45;"></div>맞힌 것</div>
        <div class="legend-item"><div class="dot" style="background:rgba(100,100,100,0.4);"></div>틀린 것</div>
        <div class="legend-item"><div class="dot" style="background:#2f7af5;"></div>정답(→)</div>
      </div>
      <table class="tbl">
        <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th><th>결과</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="btn btn-gray btn-full" style="margin-top:4px;" onclick="sStep='list';render()">다른 시험 보기</button>`);
}

// ── UTILS ──
function W(html) { document.getElementById('wrap').innerHTML = html; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast t-show';
  setTimeout(() => t.className = 'toast', 2400);
}
function copyLink(url) {
  navigator.clipboard.writeText(url).catch(() => {
    const t=document.createElement('textarea'); t.value=url;
    document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  });
  toast('링크 복사됐어요! 📎');
}

// ── START ──
render();
</script>

</body>
</html>
