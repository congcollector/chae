<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CHAESUNBE · T/F 시험</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: #f2f2f7; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; color: #1c1c1e; -webkit-font-smoothing: antialiased; }

.hdr { background: rgba(242,242,247,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.hdr-logo { font-size: 9px; letter-spacing: 2px; color: #2f7af5; text-transform: uppercase; font-weight: 600; opacity: 0.8; }
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.pill { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }
.pill-admin   { background: linear-gradient(135deg, #2f7af5, #6b3ff0); color: white; }
.pill-student { background: linear-gradient(135deg, #1a9e45, #158a3a); color: white; }

.wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

.card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.sec-title { font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.sec-title::after { content: ‘’; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }

.lbl { font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.55); margin-bottom: 5px; }
.inp { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 14px; font-family: inherit; color: #1c1c1e; outline: none; margin-bottom: 10px; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
.inp:focus { border-color: #2f7af5; background: #fff; }
.inp-sm { width: 90px; text-align: center; }
.sel-wrap { position: relative; margin-bottom: 10px; }
.sel-wrap::after { content: ‘▾’; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); font-size: 12px; color: rgba(28,28,30,0.4); pointer-events: none; }
.sel { width: 100%; padding: 11px 36px 11px 13px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 14px; font-family: inherit; color: #1c1c1e; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; transition: border-color 0.2s; }
.sel:focus { border-color: #2f7af5; background: #fff; }

.btn { padding: 13px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.15s, transform 0.1s; }
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn-full { width: 100%; margin-top: 6px; display: block; }
.btn-blue   { background: linear-gradient(135deg, #2f7af5, #6b3ff0); color: white; box-shadow: 0 2px 12px rgba(47,122,245,0.25); }
.btn-green  { background: linear-gradient(135deg, #1a9e45, #158a3a); color: white; box-shadow: 0 2px 12px rgba(26,158,69,0.2); }
.btn-gray   { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); color: rgba(28,28,30,0.55); }
.btn-red    { padding: 7px 13px; font-size: 12px; border-radius: 9px; background: rgba(217,48,37,0.1); border: 1.5px solid rgba(217,48,37,0.2); color: #d93025; }
.btn-orange { background: rgba(255,149,0,0.12); border: 1.5px solid rgba(255,149,0,0.3); color: #c4600a; font-size: 14px; font-weight: 700; padding: 12px 18px; border-radius: 12px; }

.tbl { width: 100%; border-collapse: collapse; }
.tbl th { padding: 9px 6px; text-align: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); background: #f2f2f7; border-bottom: 1.5px solid rgba(0,0,0,0.08); }
.tbl th.c0 { width: 42px; border-right: 1px solid rgba(0,0,0,0.08); }
.tbl th.c1 { border-right: 1px solid rgba(0,0,0,0.08); }
.tbl td { padding: 7px 6px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
.tbl td.c0 { font-size: 12px; font-weight: 700; color: rgba(28,28,30,0.35); border-right: 1px solid rgba(0,0,0,0.06); }
.tbl td.c1 { border-right: 1px solid rgba(0,0,0,0.06); }
.tbl tr:last-child td { border-bottom: none; }

.tfb { width: 100%; padding: 9px 4px; border-radius: 9px; border: 1.5px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 13px; font-weight: 700; cursor: pointer; color: rgba(28,28,30,0.5); font-family: inherit; transition: all 0.12s; }
.tfb:active { transform: scale(0.9); }
.t-on { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.f-on { background: #fdf0ee; border-color: #d93025; color: #d93025; }
.ok   { background: #e8f5f0; border-color: #1a9e45; color: #1a9e45; }
.no   { background: rgba(100,100,100,0.08); border-color: rgba(100,100,100,0.2); color: rgba(100,100,100,0.5); text-decoration: line-through; }

.score-box { text-align: center; padding: 28px 20px; background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 12px; }
.score-num { font-size: 56px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
.score-sub { font-size: 14px; color: rgba(28,28,30,0.55); margin-bottom: 16px; }
.bar-bg { background: #f2f2f7; border-radius: 20px; height: 8px; overflow: hidden; }
.bar-fg { height: 100%; border-radius: 20px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

/* 학교 폴더 */
.school-folder { margin-bottom: 14px; }
.school-header { display: flex; align-items: center; gap: 8px; padding: 11px 14px; background: white; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); margin-bottom: 6px; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.05); user-select: none; }
.school-icon { font-size: 18px; }
.school-name { font-size: 14px; font-weight: 700; flex: 1; }
.school-count { font-size: 12px; color: rgba(28,28,30,0.45); }
.school-arrow { font-size: 14px; color: rgba(28,28,30,0.3); transition: transform 0.2s; display: inline-block; }
.school-arrow.open { transform: rotate(90deg); }
.school-exams { padding-left: 10px; display: none; }
.school-exams.open { display: block; }

.exam-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; margin-bottom: 7px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: transform 0.12s; }
.exam-item:active { transform: scale(0.98); }
.e-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.e-icon-a { background: linear-gradient(135deg,#2f7af5,#6b3ff0); }
.e-icon-s { background: linear-gradient(135deg,#1a9e45,#158a3a); }

/* 드래그 핸들 */
.drag-handle { display: flex; align-items: center; justify-content: center; width: 24px; flex-shrink: 0; cursor: grab; color: rgba(28,28,30,0.25); font-size: 16px; padding: 4px 0; user-select: none; touch-action: none; }
.drag-handle:active { cursor: grabbing; }
.exam-item.dragging { opacity: 0.4; background: #f2f2f7; box-shadow: none; }
.exam-item.drag-over { border-color: #2f7af5; background: rgba(47,122,245,0.05); transform: scale(1.01); }

.res-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; }
.res-row:last-child { border-bottom: none; }
.res-av { width: 36px; height: 36px; border-radius: 10px; background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(28,28,30,0.5); flex-shrink: 0; text-align: center; line-height: 1.2; word-break: keep-all; padding: 0 2px; }
.score-pill { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.sp-hi { background: rgba(26,158,69,0.1);  color: #1a9e45; }
.sp-md { background: rgba(196,96,10,0.1);  color: #c4600a; }
.sp-lo { background: rgba(217,48,37,0.1);  color: #d93025; }

.name-inp { width: 100%; padding: 13px 14px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); background: #f2f2f7; font-size: 16px; font-family: inherit; color: #1c1c1e; outline: none; text-align: left; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
.name-inp:focus { border-color: #2f7af5; background: #fff; }

.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 14px; }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: rgba(28,28,30,0.35); cursor: pointer; border-bottom: 2px solid transparent; }
.tab-on { color: #2f7af5; border-bottom-color: #2f7af5; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.96); color: white; padding: 11px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.t-show { opacity: 1; }

.empty { text-align: center; padding: 50px 20px; color: rgba(28,28,30,0.45); }
.loading { text-align: center; padding: 60px 20px; color: rgba(28,28,30,0.45); font-size: 14px; }
.link-box { background: #f2f2f7; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

/* 학교 태그 */
.school-tag { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; background: rgba(47,122,245,0.1); border: 1.5px solid rgba(47,122,245,0.2); font-size: 12px; font-weight: 600; color: #2f7af5; margin: 3px; }
.stag-del { cursor: pointer; font-size: 14px; color: rgba(47,122,245,0.4); }
.stag-del:hover { color: #d93025; }

/* 수정 배너 */
.fix-banner { background: rgba(255,149,0,0.1); border: 1.5px solid rgba(255,149,0,0.3); border-radius: 12px; padding: 11px 14px; margin-bottom: 12px; font-size: 13px; color: #c4600a; font-weight: 600; }
</style>

</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">Chaesunbe Academy</div>
    <div class="hdr-title">CHAESUNBE</div>
  </div>
  <div class="pill" id="modePill"></div>
</div>

<div class="wrap" id="wrap"><div class="loading">⏳ 불러오는 중...</div></div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://pithlzhuqezeesprcbze.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const H = { 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Content-Type':'application/json' };
const api = {
  get:   p     => fetch(SUPA_URL+'/rest/v1/'+p,{headers:H}).then(r=>r.json()),
  post:  (p,b,pref) => fetch(SUPA_URL+'/rest/v1/'+p,{method:'POST',  headers:{...H,'Prefer':pref||'return=representation'},body:JSON.stringify(b)}),
  patch: (p,b) => fetch(SUPA_URL+'/rest/v1/'+p,{method:'PATCH', headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)}),
  del:   p     => fetch(SUPA_URL+'/rest/v1/'+p,{method:'DELETE',headers:H})
};

const db = {
  getExams:    ()  => api.get('exams?order=school.asc,order_index.asc,created_at.desc'),
  getBySchool: (s) => api.get('exams?school=eq.'+encodeURIComponent(s)+'&order=order_index.asc,created_at.desc'),
  saveExam:    (e) => api.post('exams',{id:e.id,name:e.name,questions:e.questions,answers:e.answers,created_at:e.createdAt,school:e.school||'기본',order_index:e.order_index||0},'resolution=merge-duplicates,return=representation'),
  patchOrder:  (id,oi) => api.patch('exams?id=eq.'+id,{order_index:oi}),
  delExam:     async id => { await api.del('exams?id=eq.'+id); await api.del('results?exam_id=eq.'+id); },
  getResults:  id  => api.get('results?exam_id=eq.'+id+'&order=score.desc'),
  saveResult:  async (eid,name,d) => {
    await api.del('results?exam_id=eq.'+eid+'&student_name=eq.'+encodeURIComponent(name));
    return api.post('results',{exam_id:eid,student_name:name,answers:d.answers,score:d.score,total:d.total,submitted_at:d.submittedAt});
  }
};

// 학교 목록 (localStorage)
const schools = {
  get: ()    => { try{ return JSON.parse(localStorage.getItem('cs_schools')||'["기본"]'); }catch{ return['기본']; }},
  set: (arr) => localStorage.setItem('cs_schools',JSON.stringify(arr)),
  add: (s)   => { const a=schools.get(); if(!a.includes(s)){a.push(s);schools.set(a);} },
  del: (s)   => schools.set(schools.get().filter(x=>x!==s))
};

// 모드
const IS_ADMIN = location.hash==='#admin-chaesunbe';
const pill = document.getElementById('modePill');
pill.textContent = IS_ADMIN?'선생님 🔑':'학생 ✏️';
pill.className   = 'pill '+(IS_ADMIN?'pill-admin':'pill-student');

// STATE
let aStep='list', aTab='create', aDetailId='', aDetailStudent='', aDetailTab='results';
let aTempName='', aTempQ=10, aTempAnswers=[], aEditId='', aTempSchool='기본';
let aFilterSchool='전체';
let sStep='entry', sExamId='', sExamData=null, sName='', sSchool='', sAnswers=[], sFixMode=false;

function render(){ IS_ADMIN?renderAdmin():renderStudent(); }
function W(h){ document.getElementById('wrap').innerHTML=h; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast t-show'; setTimeout(()=>t.className='toast',2400); }
function copyLink(url){ navigator.clipboard.writeText(url).catch(()=>{ const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }); toast('링크 복사됐어요! 📎'); }

// ══════════════════════════════
//  ADMIN
// ══════════════════════════════
function renderAdmin(){
  if(aStep==='list')    renderAList();
  else if(aStep==='answers') renderAAnswers();
  else if(aStep==='detail')  renderADetail();
  else if(aStep==='studet')  renderAStudentDetail();
  else if(aStep==='schools') renderASchools();
}

function aTabBar(){
  return `<div style="display:flex;background:#e5e5ea;border-radius:12px;padding:3px;gap:2px;margin-bottom:16px;">
    <button style="flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.15s;
      background:${aTab==='create'?'white':'transparent'};
      color:${aTab==='create'?'#1c1c1e':'rgba(28,28,30,0.5)'};
      box-shadow:${aTab==='create'?'0 1px 4px rgba(0,0,0,0.1)':'none'};"
      onclick="aTab='create';renderAList()">➕ 새 시험 만들기</button>
    <button style="flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.15s;
      background:${aTab==='view'?'white':'transparent'};
      color:${aTab==='view'?'#1c1c1e':'rgba(28,28,30,0.5)'};
      box-shadow:${aTab==='view'?'0 1px 4px rgba(0,0,0,0.1)':'none'};"
      onclick="aTab='view';renderAList()">🏫 학교별 시험 보기</button>
  </div>`;
}

async function renderAList(){
  W('<div class="loading">⏳ 불러오는 중...</div>');
  const exams = await db.getExams();
  const sl    = schools.get();
  const opts  = sl.map(s=>`<option value="${s}" ${s===aTempSchool?'selected':''}>${s}</option>`).join('');

  // ── 새 시험 만들기 탭 ──
  if(aTab==='create'){
    W(aTabBar()+`<div class="card">
      <div class="sec-title">새 시험 만들기</div>
      <div class="lbl">학교</div>
      <div class="sel-wrap"><select class="sel" id="aSchool" onchange="aTempSchool=this.value">${opts}</select></div>
      <div class="lbl">시험 이름</div>
      <input class="inp" id="aName" placeholder="예) 3월 4주차 Test / Unit 5" value="${aTempName}">
      <div class="lbl">문항 수</div>
      <input class="inp inp-sm" id="aQ" type="number" min="1" max="60" value="${aTempQ}">
      <button class="btn btn-blue btn-full" onclick="goACreate()">정답 등록하기 →</button>
    </div>`);
    return;
  }

  // ── 학교별 시험 보기 탭 ──
  // 학교별 그룹핑
  const grouped={};
  sl.forEach(s=>grouped[s]=[]);
  exams.forEach(e=>{ const s=e.school||'기본'; if(!grouped[s])grouped[s]=[]; grouped[s].push(e); });

  // 학교 필터 칩
  const allS=[...new Set([...sl,...Object.keys(grouped)])];
  const filterChips=['전체',...allS].map(s=>`
    <button onclick="aFilterSchool='${s}';renderAList()" style="
      padding:6px 14px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;
      background:${aFilterSchool===s?'#2f7af5':'white'};
      color:${aFilterSchool===s?'white':'rgba(28,28,30,0.55)'};
      border-color:${aFilterSchool===s?'#2f7af5':'rgba(0,0,0,0.1)'};
    ">${s}</button>`).join('');

  let h = aTabBar();
  h += `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;">${filterChips}</div>`;
  h += `<div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button class="btn btn-gray" onclick="aStep='schools';render()">🏫 학교 관리</button>
  </div>`;

  // 필터 적용
  const showSchools = aFilterSchool==='전체' ? allS : [aFilterSchool];
  let hasAny=false;

  showSchools.forEach(school=>{
    const list=(grouped[school]||[]);
    if(!list.length)return;
    hasAny=true;
    const fid='f_'+school.replace(/\W/g,'_');
    // 전체 보기일 때만 폴더로 묶기, 특정 학교 선택시 바로 리스트
    if(aFilterSchool==='전체'){
      h+=`<div class="school-folder">
        <div class="school-header" onclick="toggleF('${fid}')">
          <span class="school-icon">🏫</span>
          <span class="school-name">${school}</span>
          <span class="school-count">${list.length}개</span>
          <span class="school-arrow open" id="ar_${fid}">›</span>
        </div>
        <div class="school-exams open" id="${fid}">
          ${examListHTML(list,school)}
        </div>
      </div>`;
    } else {
      h += examListHTML(list, school);
    }
  });

  if(!hasAny) h+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px;">📋</div><div>시험이 없어요</div></div>`;
  W(h);
}

function examListHTML(list, school){
  const containerId = 'drag_'+school.replace(/\W/g,'_');
  // setTimeout으로 DOM 렌더 후 드래그 초기화
  setTimeout(()=>initDrag(containerId, school), 50);
  return `<div id="${containerId}">` +
    list.map(e=>`<div class="exam-item" data-id="${e.id}" data-school="${school}">
      <div class="drag-handle" title="드래그해서 순서 변경">⠿</div>
      <div class="e-icon e-icon-a" onclick="goADetail('${e.id}')" style="cursor:pointer;">📝</div>
      <div style="flex:1;cursor:pointer;min-width:0;" onclick="goADetail('${e.id}')">
        <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.name}</div>
        <div style="font-size:12px;color:rgba(28,28,30,0.5);margin-top:1px;">${e.questions}문항${aFilterSchool==='전체'?'':` · 🏫 ${e.school||'기본'}`}</div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button class="btn btn-gray" style="padding:6px 10px;" onclick="quickEdit('${e.id}')">✏️</button>

let _dragEl=null, _dragSchool='';

function initDrag(containerId, school){
  const container = document.getElementById(containerId);
  if(!container) return;
  const items = container.querySelectorAll('.exam-item');

  items.forEach(item=>{
    const handle = item.querySelector('.drag-handle');
    if(!handle) return;

    // ── 데스크탑 (mouse) ──
    handle.addEventListener('mousedown', ev=>{
      ev.preventDefault();
      startDrag(item, school, ev.clientY);
    });

    // ── 모바일 (touch) ──
    handle.addEventListener('touchstart', ev=>{
      ev.preventDefault();
      startDrag(item, school, ev.touches[0].clientY);
    }, {passive:false});
  });
}

function startDrag(item, school, startY){
  _dragEl = item;
  _dragSchool = school;
  item.classList.add('dragging');

  const container = item.parentElement;
  const items = ()=>[...container.querySelectorAll('.exam-item:not(.dragging)')];
  let lastOver = null;

  function onMove(clientY){
    // 현재 Y 위치와 가장 가까운 아이템 찾기
    const closest = items().reduce((acc, el)=>{
      const box = el.getBoundingClientRect();
      const mid = box.top + box.height/2;
      const dist = Math.abs(clientY - mid);
      return dist < acc.dist ? {el, dist, below: clientY > mid} : acc;
    }, {el:null, dist:Infinity, below:false});

    if(closest.el && closest.el !== lastOver){
      lastOver = closest.el;
      items().forEach(el=>el.classList.remove('drag-over'));
      closest.el.classList.add('drag-over');
      // 시각적으로 위치 이동
      if(closest.below){
        container.insertBefore(_dragEl, closest.el.nextSibling);
      } else {
        container.insertBefore(_dragEl, closest.el);
      }
    }
  }

  async function endDrag(){
    if(!_dragEl) return;
    _dragEl.classList.remove('dragging');
    container.querySelectorAll('.exam-item').forEach(el=>el.classList.remove('drag-over'));

    // 새 순서로 DB 업데이트
    const newOrder = [...container.querySelectorAll('.exam-item')].map(el=>el.dataset.id);
    await Promise.all(newOrder.map((id,i)=>db.patchOrder(id,i)));
    toast('순서가 저장됐어요 ✅');
    _dragEl=null; _dragSchool='';

    // 이벤트 제거
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
  }

  const onMouseMove = ev => onMove(ev.clientY);
  const onMouseUp   = ()  => endDrag();
  const onTouchMove = ev => { ev.preventDefault(); onMove(ev.touches[0].clientY); };
  const onTouchEnd  = ()  => endDrag();

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend',  onTouchEnd);
}

  idxList.forEach(i=>{
    const a=sAnswers[i]||'';
    rows+=`<tr><td class="c0">${i+1}</td>
      <td class="c1"><button class="tfb ${a==='T'?'t-on':''}" onclick="pickS(${i},'T')">T</button></td>
      <td><button class="tfb ${a==='F'?'f-on':''}" onclick="pickS(${i},'F')">F</button></td></tr>`;
  });

  const banner=sFixMode?`<div class="fix-banner">✏️ 틀린 ${total}문항만 다시 선택하세요</div>`:'';

  W(`${banner}<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:15px;font-weight:700;">${e.name}</div>
      <div style="font-size:12px;color:rgba(28,28,30,0.5);margin-top:1px;" id="sFill">✏️ ${sName} · ${filled}/${total} 체크</div>
    </div>
  </div>
  <div class="card"><table class="tbl">
    <thead><tr><th class="c0">#</th><th class="c1">True</th><th>False</th></tr></thead>
    <tbody id="sBody">${rows}</tbody>
  </table></div>
  <button class="btn btn-green btn-full" onclick="doSubmit()">${sFixMode?'수정 제출 →':'제출하기 →'}</button>
  <div style="font-size:12px;color:rgba(28,28,30,0.45);text-align:center;margin-top:10px;">모든 문항을 체크한 후 제출하세요</div>`);
}

function pickS(i,v){
  sAnswers[i]=v;
  // DOM 업데이트
  const tb=document.getElementById('sBody');if(!tb){render();return;}
  tb.querySelectorAll('tr').forEach(row=>{
    const nc=row.querySelector('.c0');if(!nc)return;
    if(parseInt(nc.textContent)-1!==i)return;
    const bt=row.querySelectorAll('.tfb');
    bt[0].className='tfb '+(v==='T'?'t-on':'');
    bt[1].className='tfb '+(v==='F'?'f-on':'');
  });
  // 카운터 업데이트
  const prev=window._prevResult;
  const wrongIdxs=sFixMode&&prev?sExamData.answers.map((a,idx)=>a!==prev.answers[idx]?idx:-1).filter(x=>x>=0):null;
  const total=sFixMode&&wrongIdxs?wrongIdxs.length:sExamData.questions;
  const filled=sFixMode&&wrongIdxs?wrongIdxs.filter(x=>sAnswers[x]).length:sAnswers.filter(a=>a).length;
  const fc=document.getElementById('sFill');
  if(fc)fc.textContent=`✏️ ${sName} · ${filled}/${total} 체크`;
}

async function doSubmit(){
  const e=sExamData;
  const prev=window._prevResult;
  const wrongIdxs=sFixMode&&prev?e.answers.map((a,i)=>a!==prev.answers[i]?i:-1).filter(i=>i>=0):null;

  if(sFixMode&&wrongIdxs){
    const unch=wrongIdxs.filter(i=>!sAnswers[i]);
    if(unch.length){toast(`${unch.length}문항이 남았어요`);return;}
  } else {
    const filled=sAnswers.filter(a=>a).length;
    if(filled<e.questions){toast(`${e.questions-filled}문항이 남았어요`);return;}
  }

  let score=0;
  for(let i=0;i<e.questions;i++)if(sAnswers[i]===e.answers[i])score++;
  W('<div class="loading">📤 제출 중...</div>');
  const res=await db.saveResult(sExamId,sName,{answers:sAnswers.slice(),score,total:e.questions,submittedAt:Date.now()});
  if(!res.ok){toast('제출 실패, 다시 시도해주세요');sStep='exam';render();return;}
  sFixMode=false;sStep='result';render();
}

// ── 결과 ──
async function renderSResult(){
  W('<div class="loading">⏳ 결과 불러오는 중...</div>');
  const results=await db.getResults(sExamId);
  const r=results.find(x=>x.student_name===sName);
  const e=sExamData;
  if(!r){sStep='list';render();return;}
  window._prevResult=r;

  const pct=Math.round(r.score/r.total*100),wrong=r.total-r.score;
  const col=pct>=80?'#1a9e45':pct>=60?'#c4600a':'#d93025';
  const msg=pct>=90?'🎉 훌륭해요!':pct>=70?'👍 잘했어요!':pct>=50?'😊 조금만 더!':'💪 다시 도전!';

  W(`<div class="score-box">
      <div style="font-size:26px;margin-bottom:8px;">${msg}</div>
      <div class="score-num" style="color:${col}">${r.score} / ${r.total}</div>
      <div class="score-sub">${sName} · ${wrong>0?`<span style="color:#d93025;font-weight:600;">${wrong}개 틀림</span>`:'전부 정답! 🎯'}</div>
      <div class="bar-bg" style="margin-top:12px;"><div class="bar-fg" style="width:${pct}%;background:${col};"></div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
      ${wrong>0?`<button class="btn btn-orange btn-full" style="margin:0;" onclick="goFix()">✏️ 틀린 ${wrong}문항만 다시 풀기</button>`:''}
      <button class="btn btn-gray btn-full" style="margin:0;" onclick="sStep='list';render()">✓ 완료</button>
    </div>`);
}
}

function goFix(){
  const e=sExamData,prev=window._prevResult;
  sAnswers=prev.answers.slice();
  for(let i=0;i<e.questions;i++)if(prev.answers[i]!==e.answers[i])sAnswers[i]='';
  sFixMode=true;sStep='exam';render();
}

render();
</script>

</body>
</html>
